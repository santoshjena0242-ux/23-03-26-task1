<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <title>Book Form | LibraryMS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand">📚 LibraryMS</div>
  <div class="nav-links">
    <div class="nav-group">
      <a th:href="@{/admin/dashboard}">Dashboard</a>
      <a th:href="@{/admin/books}" class="active">Books</a>
    </div>
    <span class="nav-user">
      👤 <span sec:authentication="name">Admin</span>
      <a th:href="@{/logout}" class="btn-logout">Logout</a>
    </span>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h2 th:text="${book.id != null} ? 'Edit Book' : 'Add New Book'">Book Form</h2>
    <a th:href="@{/admin/books}" class="btn btn-outline">← Back</a>
  </div>

  <div class="card form-card">
    <form th:action="${book.id != null} ? @{/admin/books/{id}/edit(id=${book.id})} : @{/admin/books/new}"
          method="post">
      <div class="form-row">
        <div class="form-group">
          <label>Title *</label>
          <input type="text" name="title" class="form-control"
                 th:value="${book.title}" placeholder="Book title" required/>
        </div>
        <div class="form-group">
          <label>ISBN</label>
          <input type="text" name="isbn" class="form-control"
                 th:value="${book.isbn}" placeholder="978-XXXXXXXXXX"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Author *</label>
          <select name="authorId" class="form-control" required>
            <option value="">-- Select Author --</option>
            <option th:each="a : ${authors}"
                    th:value="${a.id}"
                    th:text="${a.name}"
                    th:selected="${book.author != null and book.author.id == a.id}">
            </option>
          </select>
        </div>
        <div class="form-group">
          <label>Genre</label>
          <input type="text" name="genre" class="form-control"
                 th:value="${book.genre}" placeholder="e.g. Fiction"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Publisher</label>
          <input type="text" name="publisher" class="form-control"
                 th:value="${book.publisher}" placeholder="Publisher name"/>
        </div>
        <div class="form-group">
          <label>Published Year</label>
          <input type="number" name="publishedYear" class="form-control"
                 th:value="${book.publishedYear}" placeholder="2024" min="1000" max="2100"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Total Copies *</label>
          <input type="number" name="totalCopies" class="form-control"
                 th:value="${book.totalCopies != null ? book.totalCopies : 1}"
                 min="1" required/>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary"
                th:text="${book.id != null} ? 'Update Book' : 'Add Book'">Save</button>
        <a th:href="@{/admin/books}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
