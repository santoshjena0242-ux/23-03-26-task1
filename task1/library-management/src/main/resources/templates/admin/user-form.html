<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <title>Add User | LibraryMS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand">📚 LibraryMS</div>
  <div class="nav-links">
    <div class="nav-group">
      <a th:href="@{/admin/dashboard}">Dashboard</a>
      <a th:href="@{/admin/users}" class="active">Users</a>
      <a th:href="@{/admin/authors}">Authors</a>
      <a th:href="@{/admin/books}">Books</a>
    </div>
    <span class="nav-user">
      👤 <span sec:authentication="name">Admin</span>
      <a th:href="@{/logout}" class="btn-logout">Logout</a>
    </span>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h2>➕ Create New User</h2>
    <a th:href="@{/admin/users}" class="btn btn-outline">← Back</a>
  </div>

  <div class="card form-card">
    <form th:action="@{/admin/users/new}" method="post">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="fullName" class="form-control" placeholder="John Doe" required/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="john@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required minlength="6"/>
      </div>
      <div class="form-group">
        <label>Role</label>
        <select name="roleName" class="form-control">
          <option value="ROLE_MEMBER">Member</option>
          <option value="ROLE_LIBRARIAN">Librarian</option>
          <option value="ROLE_ADMIN">Admin</option>
        </select>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Create User</button>
        <a th:href="@{/admin/users}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
