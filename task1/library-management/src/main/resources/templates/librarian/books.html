<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <title>Books | LibraryMS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand">📚 LibraryMS</div>
  <div class="nav-links">
    <div class="nav-group">
      <a th:href="@{/librarian/dashboard}">Dashboard</a>
      <a th:href="@{/librarian/books}" class="active">Books</a>
      <a th:href="@{/librarian/issue}">Issue Book</a>
      <a th:href="@{/librarian/return}">Return Book</a>
      <a th:href="@{/librarian/overdue}">Overdue</a>
      <a th:href="@{/librarian/members}">Members</a>
    </div>
    <span class="nav-user">
      👤 <span sec:authentication="name">Librarian</span>
      <a th:href="@{/logout}" class="btn-logout">Logout</a>
    </span>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h2>📖 Book Catalog</h2>
  </div>

  <form th:action="@{/librarian/books}" method="get" class="search-bar">
    <input type="text" name="search" class="form-control" placeholder="Search by title..."
           th:value="${search}"/>
    <button type="submit" class="btn btn-primary">Search</button>
    <a th:href="@{/librarian/books}" class="btn btn-outline">Clear</a>
  </form>

  <div class="card">
    <table class="table">
      <thead>
        <tr><th>#</th><th>Title</th><th>Author</th><th>Genre</th><th>Total</th><th>Available</th></tr>
      </thead>
      <tbody>
        <tr th:each="b : ${books}">
          <td th:text="${b.id}"></td>
          <td th:text="${b.title}"></td>
          <td th:text="${b.author != null ? b.author.name : '-'}"></td>
          <td th:text="${b.genre != null ? b.genre : '-'}"></td>
          <td th:text="${b.totalCopies}"></td>
          <td>
            <span th:text="${b.availableCopies}"
                  th:class="${b.availableCopies == 0} ? 'text-danger fw-bold' : 'text-success fw-bold'">
            </span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
