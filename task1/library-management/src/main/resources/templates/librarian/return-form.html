<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <title>Return Book | LibraryMS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand">📚 LibraryMS</div>
  <div class="nav-links">
    <div class="nav-group">
      <a th:href="@{/librarian/dashboard}">Dashboard</a>
      <a th:href="@{/librarian/books}">Books</a>
      <a th:href="@{/librarian/issue}">Issue Book</a>
      <a th:href="@{/librarian/return}" class="active">Return Book</a>
      <a th:href="@{/librarian/overdue}">Overdue</a>
      <a th:href="@{/librarian/members}">Members</a>
    </div>
    <span class="nav-user">
      👤 <span sec:authentication="name">Librarian</span>
      <a th:href="@{/logout}" class="btn-logout">Logout</a>
    </span>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h2>📥 Return a Book</h2>
  </div>

  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

  <div class="card">
    <div th:if="${#lists.isEmpty(activeRecords)}" class="empty-state">
      <p>✅ No active issues at the moment.</p>
    </div>

    <table th:if="${!#lists.isEmpty(activeRecords)}" class="table">
      <thead>
        <tr>
          <th>#</th><th>Book Title</th><th>Member</th>
          <th>Issue Date</th><th>Due Date</th><th>Status</th><th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="r : ${activeRecords}"
            th:classappend="${r.status.name() == 'OVERDUE'} ? 'row-danger' : ''">
          <td th:text="${r.id}"></td>
          <td th:text="${r.book.title}"></td>
          <td th:text="${r.user.fullName}"></td>
          <td th:text="${r.issueDate}"></td>
          <td th:text="${r.dueDate}"
              th:class="${r.status.name() == 'OVERDUE'} ? 'text-danger' : ''"></td>
          <td>
            <span class="badge"
                  th:classappend="${r.status.name() == 'OVERDUE'} ? 'badge-danger' : 'badge-info'"
                  th:text="${r.status}">
            </span>
          </td>
          <td>
            <form th:action="@{/librarian/return/{id}(id=${r.id})}" method="post"
                  onsubmit="return confirm('Confirm return of this book?')">
              <button class="btn btn-sm btn-success">Return</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
