<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <title>Librarian Dashboard | LibraryMS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand">📚 LibraryMS</div>
  <div class="nav-links">
    <div class="nav-group">
      <a th:href="@{/librarian/dashboard}" class="active">Dashboard</a>
      <a th:href="@{/librarian/books}">Books</a>
      <a th:href="@{/librarian/issue}">Issue Book</a>
      <a th:href="@{/librarian/return}">Return Book</a>
      <a th:href="@{/librarian/overdue}">Overdue</a>
      <a th:href="@{/librarian/members}">Members</a>
    </div>
    <span class="nav-user">
      👤 <span sec:authentication="name">Librarian</span>
      <a th:href="@{/logout}" class="btn-logout">Logout</a>
    </span>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h2>Librarian Dashboard</h2>
    <span class="badge badge-librarian">LIBRARIAN</span>
  </div>

  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card stat-green">
      <div class="stat-icon">📖</div>
      <div class="stat-info">
        <div class="stat-value" th:text="${totalBooks}">0</div>
        <div class="stat-label">Total Books</div>
      </div>
    </div>
    <div class="stat-card stat-blue">
      <div class="stat-icon">✅</div>
      <div class="stat-info">
        <div class="stat-value" th:text="${availableBooks}">0</div>
        <div class="stat-label">Available</div>
      </div>
    </div>
    <div class="stat-card stat-orange">
      <div class="stat-icon">📋</div>
      <div class="stat-info">
        <div class="stat-value" th:text="${activeIssues}">0</div>
        <div class="stat-label">Active Issues</div>
      </div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions mt-4">
    <h3>Quick Actions</h3>
    <div class="action-grid">
      <a th:href="@{/librarian/issue}"   class="action-card">📤 Issue Book</a>
      <a th:href="@{/librarian/return}"  class="action-card">📥 Return Book</a>
      <a th:href="@{/librarian/overdue}" class="action-card">⚠️ View Overdue</a>
      <a th:href="@{/librarian/issues}"  class="action-card">📋 All Records</a>
    </div>
  </div>

  <!-- Overdue Alert -->
  <div class="card mt-4" th:if="${!#lists.isEmpty(overdueList)}">
    <div class="card-header">
      <h3>⚠️ Overdue Books (<span th:text="${#lists.size(overdueList)}">0</span>)</h3>
    </div>
    <table class="table">
      <thead>
        <tr><th>Book</th><th>Member</th><th>Due Date</th></tr>
      </thead>
      <tbody>
        <tr th:each="r : ${overdueList}">
          <td th:text="${r.book.title}"></td>
          <td th:text="${r.user.fullName}"></td>
          <td th:text="${r.dueDate}" class="text-danger"></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
