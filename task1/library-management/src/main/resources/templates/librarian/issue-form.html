<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <title>Issue Book | LibraryMS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand">📚 LibraryMS</div>
  <div class="nav-links">
    <div class="nav-group">
      <a th:href="@{/librarian/dashboard}">Dashboard</a>
      <a th:href="@{/librarian/books}">Books</a>
      <a th:href="@{/librarian/issue}" class="active">Issue Book</a>
      <a th:href="@{/librarian/return}">Return Book</a>
      <a th:href="@{/librarian/overdue}">Overdue</a>
      <a th:href="@{/librarian/members}">Members</a>
    </div>
    <span class="nav-user">
      👤 <span sec:authentication="name">Librarian</span>
      <a th:href="@{/logout}" class="btn-logout">Logout</a>
    </span>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h2>📤 Issue Book to Member</h2>
  </div>

  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

  <div class="card form-card">
    <form th:action="@{/librarian/issue}" method="post">
      <div class="form-group">
        <label>Select Book (Available Only) *</label>
        <select name="bookId" class="form-control" required>
          <option value="">-- Select a Book --</option>
          <option th:each="b : ${books}"
                  th:value="${b.id}"
                  th:text="${b.title} + ' by ' + ${b.author != null ? b.author.name : 'Unknown'} + ' [' + ${b.availableCopies} + ' available]'">
          </option>
        </select>
      </div>
      <div class="form-group">
        <label>Select Member *</label>
        <select name="userId" class="form-control" required>
          <option value="">-- Select a Member --</option>
          <option th:each="m : ${members}"
                  th:value="${m.id}"
                  th:text="${m.fullName} + ' (' + ${m.email} + ')'">
          </option>
        </select>
      </div>
      <div class="info-box">
        <p>📌 Loan period: <strong>14 days</strong></p>
        <p>📌 Max books per member: <strong>3</strong></p>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Issue Book</button>
        <a th:href="@{/librarian/dashboard}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
